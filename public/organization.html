<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trello Board - Organization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; min-height: 100vh; }

        .navbar { background: #0079bf; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .navbar .left { display: flex; align-items: center; gap: 12px; }
        .navbar h1 { color: #fff; font-size: 20px; cursor: pointer; }
        .navbar .breadcrumb { color: rgba(255,255,255,0.7); font-size: 14px; }
        .navbar .breadcrumb a { color: rgba(255,255,255,0.7); text-decoration: none; }
        .navbar .breadcrumb a:hover { color: #fff; }
        .navbar .right { display: flex; align-items: center; gap: 14px; }
        .navbar .username { color: rgba(255,255,255,0.9); font-size: 14px; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 4px; }
        .navbar button { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .navbar button:hover { background: rgba(255,255,255,0.3); }

        .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .page-header { margin-bottom: 24px; }
        .page-header h2 { font-size: 22px; color: #172b4d; }
        .page-header p { color: #5e6c84; font-size: 14px; margin-top: 4px; }

        /* .panels { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; } */

        .panel { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid #ebecf0; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h3 { font-size: 15px; color: #172b4d; }
        .panel-body { padding: 12px; }

        .board-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: 6px; cursor: pointer; transition: background 0.15s; border-left: 3px solid #0079bf; margin-bottom: 8px; background: #f9fafb; }
        .board-item:hover { background: #e4f0f6; }
        .board-item h4 { font-size: 14px; color: #172b4d; }
        .board-item .arrow { color: #5e6c84; font-size: 18px; }

        .member-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #f4f5f7; }
        .member-item:last-child { border-bottom: none; }
        .member-item .avatar { width: 32px; height: 32px; border-radius: 50%; background: #0079bf; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; margin-right: 10px; }
        .member-item .info { display: flex; align-items: center; }
        .member-item .name { font-size: 14px; color: #172b4d; }
        .member-item .role { font-size: 11px; color: #5e6c84; background: #f4f5f7; padding: 1px 8px; border-radius: 10px; margin-left: 8px; }
        .member-item .btn-remove { background: none; border: none; color: #eb5a46; cursor: pointer; font-size: 18px; padding: 0 4px; }
        .member-item .btn-remove:hover { color: #cf513d; }

        .btn-create { background: #0079bf; color: #fff; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-create:hover { background: #026aa7; }

        .empty-panel { text-align: center; padding: 30px; color: #5e6c84; font-size: 13px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 8px; padding: 28px; width: 420px; max-width: 90%; }
        .modal h3 { margin-bottom: 20px; color: #172b4d; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #5e6c84; margin-bottom: 4px; text-transform: uppercase; }
        .modal input { width: 100%; padding: 10px; border: 2px solid #dfe1e6; border-radius: 4px; font-size: 14px; }
        .modal input:focus { border-color: #0079bf; outline: none; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
        .modal-actions button { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-primary { background: #0079bf; color: #fff; }
        .btn-cancel { background: #f4f5f7; color: #172b4d; }
        #backToOrgs { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        #backToOrgs:hover { background: rgba(255,255,255,0  .3); }
        .panel-align { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        .remove-btn { background: #eb5a46; border: none; border-radius: 4px;color: #f7f7f7; cursor: pointer; font-size: 14px; padding: 4px 8px; }


    @media (max-width: 768px) {
        .panel-align {
            display: flex;
            flex-direction: column;
            gap: 16px;
            }
        }

        @media (max-width: 480px) {

        .container {
            padding: 16px 10px;
        }

        .panel-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }

        .btn-create {
            width: 100%;
        }
    }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="left">
            <h1 onclick="location.href='dashboard.html'">🗂 Trello Board</h1>
            <button id="backToOrgs" onclick="location.href='dashboard.html'">Back</button>
        </div>
        <div class="right">
            <span class="username" id="usernameDisplay"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2 id="orgTitle"></h2>
            <p id="orgDescription"></p>
        </div>
    
    <div class="panel-align">
        <div class="panels">
            <!-- Boards Panel -->
            <div class="panel">
                <div class="panel-header">
                    <h3>📋 Boards</h3>
                    <button class="btn-create" onclick="showModal('board')">+ New Board</button>
                </div>
                <div class="panel-body" id="boardList"></div>
            </div>
        </div>

            <!-- Members Panel -->
        <div class="panels">
            <div class="panel">
                <div class="panel-header">
                    <h3>👥 Members</h3>
                    <button class="btn-create" onclick="showModal('member')">+ Add</button>
                </div>
                <div class="panel-body" id="memberList"></div>
            </div>
        </div>  
    </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)hideModal()">
        <div class="modal">
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="hideModal()">Cancel</button>
                <button class="btn-primary" id="modalSubmit" onclick="createBoard()">Create</button>
            </div>
        </div>
    </div>


    <script>
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }

        function showModal(type){
            document.getElementById('modalOverlay').classList.add('show');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            const modalSubmit = document.getElementById('modalSubmit');
            if(type === 'board'){
                modalTitle.innerHTML = 'Create New Board';
                modalBody.innerHTML = `
                    <div class="form-group">
                        <label>Board Name</label>
                        <input type="text" id="boardName" placeholder="e.g. Sprint Planning">
                    </div>
                `;
                modalSubmit.innerHTML = 'Create';
                modalSubmit.onclick = createBoard;
            } else if(type === 'member'){
                modalTitle.textContent = 'Add Member to Organization';
                modalBody.innerHTML = `
                    <div class="form-group">
                        <label>Member Username</label>
                        <input type="text" id="memberUsername" placeholder="e.g. johndoe">
                    </div>
                `;
                modalSubmit.innerHTML = 'Add Member';
                modalSubmit.onclick = addMember;
            }
        }

        function hideModal(){
            document.getElementById('modalOverlay').classList.remove('show');
        }

        async function createBoard(){
            const boardName = document.getElementById('boardName').value
            if(!boardName){
                alert('Please enter a board name');
                return;
            }

            const token = localStorage.getItem('token');
            const orgId = new URLSearchParams(window.location.search).get('orgId');

            try {
                const response = await fetch('http://localhost:3000/boards', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ boardName: boardName, orgId: orgId })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Board created successfully');
                    hideModal();
                    // Optionally, refresh the board list here
                } else {
                    alert(data.message || 'Failed to create board');
                }
            } catch (error) {
                console.error('Error creating board:', error);
                alert('An error occurred while creating the board');
            }
        }

        async function loadOrgBoards(){
            const token = localStorage.getItem('token');
            const orgId = new URLSearchParams(window.location.search).get('orgId');

            try {
                const response = await fetch(`http://localhost:3000/boards?orgId=${orgId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                });
                const data = await response.json();

                console.log(data);

                if (response.ok) {
                    const boardList = document.getElementById('boardList');
                    boardList.innerHTML = '';
                    data.boards.forEach(board => {
                        const boardItem = document.createElement('div');
                        boardItem.className = 'board-item';
                        boardItem.innerHTML = `
                            <h4>${board.name}</h4>
                            <span class="arrow">➡️</span>
                        `;
                        boardItem.onclick = () => {
                            window.location.href = `board.html?boardId=${board._id}`;
                        };
                        boardList.appendChild(boardItem);
                    });
                } else {
                    alert(data.message || 'Failed to load boards');
                }
            } catch (error) {
                console.error('Error loading boards:', error);
                alert('An error occurred while loading boards');
            }
        }

        async function LoadMembers(){
            const token = localStorage.getItem('token');
            const orgId = new URLSearchParams(window.location.search).get('orgId');

            try {
                const response = await fetch(`http://localhost:3000/members?orgId=${orgId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                });
                const data = await response.json();

                if (response.ok) {
                    const memberList = document.getElementById('memberList');
                    memberList.innerHTML = '';

                    const isAdmin = data.isAdmin;
                    data.members.forEach(member => {
                        const memberItem = document.createElement('div');
                        memberItem.className = 'member-item';
                        memberItem.innerHTML = `
                            <h4 id="${member._id}">${member.username}</h4>
                        `;
                        memberList.appendChild(memberItem);

                        if (isAdmin) {
                            const removeBtn = document.createElement('button');
                            removeBtn.textContent = 'Remove';
                            removeBtn.className = 'remove-btn';

                            removeBtn.onclick = () => removeMember(member.username);

                            memberItem.appendChild(removeBtn);
                        }
                    });
                } else {
                    alert(data.message || 'Failed to load members');
                }

            } catch (error) {
                console.error('Error loading members:', error);
                alert('An error occurred while loading members');
            }
        }

        async function removeMember(memberUsername) {
            const token = localStorage.getItem('token');
            const orgId = new URLSearchParams(window.location.search).get('orgId');

            try{
                const response = await fetch(`http://localhost:3000/delete-member`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username: memberUsername, orgId: orgId })
                });
                const data = await response.json();

                if (response.ok) {
                    alert('Member removed successfully');
                    LoadMembers();
                } else {
                    alert(data.message || 'Failed to remove member');
                }
            }
            catch(error){
                console.error('Error removing member:', error);
                alert('An error occurred while removing the member');
            }
        }

        window.onload = function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            // Load organization details and boards
            loadOrgBoards();
            LoadMembers();
        }

        async function addMember(){
                const memberName = document.getElementById('memberUsername').value
            if(!memberName){
                alert('Please enter a member username');
                return;
            }

            const token = localStorage.getItem('token');
            const orgId = new URLSearchParams(window.location.search).get('orgId');

            try {
                const response = await fetch(`http://localhost:3000/addUserToOrganization`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username: memberName, orgId: orgId })
                });
                const data = await response.json();

                if (response.ok) {
                    alert('Member added successfully');
                    hideModal();
                    LoadMembers();
                    // Optionally, refresh the member list here
                } else {
                    alert(data.message || 'Failed to add member');
                }
            } catch (error) {
                console.error('Error adding member:', error);
                alert('An error occurred while adding the member');

            }
        }
    </script>
</body>
</html>
