<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trello Board - Organization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; min-height: 100vh; }

        .navbar { background: #0079bf; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .navbar .left { display: flex; align-items: center; gap: 12px; }
        .navbar h1 { color: #fff; font-size: 20px; cursor: pointer; }
        .navbar .breadcrumb { color: rgba(255,255,255,0.7); font-size: 14px; }
        .navbar .breadcrumb a { color: rgba(255,255,255,0.7); text-decoration: none; }
        .navbar .breadcrumb a:hover { color: #fff; }
        .navbar .right { display: flex; align-items: center; gap: 14px; }
        .navbar .username { color: rgba(255,255,255,0.9); font-size: 14px; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 4px; }
        .navbar button { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .navbar button:hover { background: rgba(255,255,255,0.3); }

        .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .page-header { margin-bottom: 24px; }
        .page-header h2 { font-size: 22px; color: #172b4d; }
        .page-header p { color: #5e6c84; font-size: 14px; margin-top: 4px; }

        .panels { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }

        .panel { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid #ebecf0; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h3 { font-size: 15px; color: #172b4d; }
        .panel-body { padding: 12px; }

        .board-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: 6px; cursor: pointer; transition: background 0.15s; border-left: 3px solid #0079bf; margin-bottom: 8px; background: #f9fafb; }
        .board-item:hover { background: #e4f0f6; }
        .board-item h4 { font-size: 14px; color: #172b4d; }
        .board-item .arrow { color: #5e6c84; font-size: 18px; }

        .member-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #f4f5f7; }
        .member-item:last-child { border-bottom: none; }
        .member-item .avatar { width: 32px; height: 32px; border-radius: 50%; background: #0079bf; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; margin-right: 10px; }
        .member-item .info { display: flex; align-items: center; }
        .member-item .name { font-size: 14px; color: #172b4d; }
        .member-item .role { font-size: 11px; color: #5e6c84; background: #f4f5f7; padding: 1px 8px; border-radius: 10px; margin-left: 8px; }
        .member-item .btn-remove { background: none; border: none; color: #eb5a46; cursor: pointer; font-size: 18px; padding: 0 4px; }
        .member-item .btn-remove:hover { color: #cf513d; }

        .btn-create { background: #0079bf; color: #fff; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-create:hover { background: #026aa7; }

        .empty-panel { text-align: center; padding: 30px; color: #5e6c84; font-size: 13px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 8px; padding: 28px; width: 420px; max-width: 90%; }
        .modal h3 { margin-bottom: 20px; color: #172b4d; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #5e6c84; margin-bottom: 4px; text-transform: uppercase; }
        .modal input { width: 100%; padding: 10px; border: 2px solid #dfe1e6; border-radius: 4px; font-size: 14px; }
        .modal input:focus { border-color: #0079bf; outline: none; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
        .modal-actions button { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-primary { background: #0079bf; color: #fff; }
        .btn-cancel { background: #f4f5f7; color: #172b4d; }

        @media (max-width: 768px) { .panels { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="left">
            <h1 onclick="location.href='dashboard.html'">🗂 Trello Board</h1>
            <span class="breadcrumb">/ <a href="dashboard.html">Organizations</a> / <span id="orgNameNav"></span></span>
        </div>
        <div class="right">
            <span class="username" id="usernameDisplay"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2 id="orgTitle"></h2>
            <p id="orgDescription"></p>
        </div>

        <div class="panels">
            <!-- Boards Panel -->
            <div class="panel">
                <div class="panel-header">
                    <h3>📋 Boards</h3>
                    <button class="btn-create" onclick="showModal('board')">+ New Board</button>
                </div>
                <div class="panel-body" id="boardList"></div>
            </div>

            <!-- Members Panel -->
            <div class="panel">
                <div class="panel-header">
                    <h3>👥 Members</h3>
                    <button class="btn-create" onclick="showModal('member')">+ Add</button>
                </div>
                <div class="panel-body" id="memberList"></div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)hideModal()">
        <div class="modal">
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="hideModal()">Cancel</button>
                <button class="btn-primary" id="modalSubmit">Create</button>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        const token = localStorage.getItem('token');
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        const org = JSON.parse(localStorage.getItem('selectedOrg') || 'null');
        if (!token || !currentUser) window.location.href = 'login.html';
        if (!org) window.location.href = 'dashboard.html';

        document.getElementById('usernameDisplay').textContent = currentUser.username;
        document.getElementById('orgNameNav').textContent = org.name;
        document.getElementById('orgTitle').textContent = org.name;
        document.getElementById('orgDescription').textContent = org.description;

        function api(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token } };
            if (body) opts.body = JSON.stringify(body);
            return fetch(API + path, opts).then(r => r.json().then(d => ({ ok: r.ok, data: d })));
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        async function loadBoards() {
            const res = await api('GET', '/boards', { orgId: org.id });
            const list = document.getElementById('boardList');
            if (!res.ok || !res.data.boards.length) {
                list.innerHTML = '<div class="empty-panel">No boards yet. Create one!</div>';
                return;
            }
            list.innerHTML = '';
            res.data.boards.forEach(board => {
                const div = document.createElement('div');
                div.className = 'board-item';
                div.innerHTML = `<h4>${board.name}</h4><span class="arrow">→</span>`;
                div.onclick = () => {
                    localStorage.setItem('selectedBoard', JSON.stringify(board));
                    window.location.href = 'board.html';
                };
                list.appendChild(div);
            });
        }

        async function loadMembers() {
            const res = await api('GET', '/members', { orgId: org.id });
            const list = document.getElementById('memberList');

            // Show admin first
            const adminHtml = `<div class="member-item">
                <div class="info">
                    <div class="avatar">${currentUser.username[0].toUpperCase()}</div>
                    <span class="name">${currentUser.username}</span>
                    <span class="role">Admin</span>
                </div>
            </div>`;

            if (!res.ok || !res.data.members.length) {
                list.innerHTML = adminHtml + '<div class="empty-panel">No other members yet.</div>';
                return;
            }
            let html = adminHtml;
            res.data.members.forEach(m => {
                html += `<div class="member-item">
                    <div class="info">
                        <div class="avatar">${m.username[0].toUpperCase()}</div>
                        <span class="name">${m.username}</span>
                        <span class="role">Member</span>
                    </div>
                    <button class="btn-remove" onclick="removeMember('${m.username}')" title="Remove">✕</button>
                </div>`;
            });
            list.innerHTML = html;
        }

        async function removeMember(username) {
            if (!confirm('Remove ' + username + '?')) return;
            await api('DELETE', '/delete-member', { username, orgId: org.id });
            loadMembers();
        }

        function showModal(type) {
            const overlay = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            const submit = document.getElementById('modalSubmit');

            if (type === 'board') {
                title.textContent = 'Create Board';
                body.innerHTML = '<div class="form-group"><label>Board Name</label><input type="text" id="m_input" placeholder="e.g. Sprint 1"></div>';
                submit.onclick = async () => {
                    const name = document.getElementById('m_input').value.trim();
                    if (!name) return;
                    const res = await api('POST', '/boards', { boardName: name, orgId: org.id });
                    if (!res.ok) return alert(res.data.message);
                    hideModal(); loadBoards();
                };
            } else {
                title.textContent = 'Add Member';
                body.innerHTML = '<div class="form-group"><label>Username</label><input type="text" id="m_input" placeholder="Enter username"></div>';
                submit.onclick = async () => {
                    const username = document.getElementById('m_input').value.trim();
                    if (!username) return;
                    const res = await api('POST', '/addUserToOrganization', { username, orgId: org.id });
                    if (!res.ok) return alert(res.data.message);
                    hideModal(); loadMembers();
                };
            }
            submit.textContent = type === 'board' ? 'Create' : 'Add';
            overlay.classList.add('show');
        }

        function hideModal() { document.getElementById('modalOverlay').classList.remove('show'); }

        loadBoards();
        loadMembers();
    </script>
</body>
</html>
