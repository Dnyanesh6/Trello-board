<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trello Board - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0079bf; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: #fff; padding: 32px; border-radius: 8px; width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
        .logo { text-align: center; margin-bottom: 24px; font-size: 28px; font-weight: 700; color: #0079bf; }
        .auth-box h2 { margin-bottom: 20px; color: #172b4d; text-align: center; font-size: 16px; color: #5e6c84; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #5e6c84; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 10px 12px; border: 2px solid #dfe1e6; border-radius: 4px; font-size: 14px; transition: border-color 0.2s; }
        input:focus { border-color: #0079bf; outline: none; }
        .btn { width: 100%; padding: 10px; background: #0079bf; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
        .btn:hover { background: #026aa7; }
        .toggle { text-align: center; margin-top: 18px; color: #5e6c84; font-size: 13px; }
        .toggle a { color: #0079bf; cursor: pointer; text-decoration: underline; font-weight: 600; }
        .error { background: #ffebe6; color: #bf2600; padding: 8px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 12px; display: none; }
    </style>
</head>
<body>
    <div class="auth-box">
        <div class="logo">🗂 Trello Board</div>
        <h2 id="authSubtitle">Sign in to your account</h2>
        <div class="error" id="errorMsg"></div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        <button class="btn" id="authBtn" onclick="handleAuth()">Sign In</button>
        <div class="toggle">
            <span id="toggleText">Don't have an account?</span>
            <a id="toggleLink" onclick="toggleMode()">Sign Up</a>
        </div>
    </div>

    <script>
        const API = '';
        let isSignUp = false;

        // Redirect if already logged in
        if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('authBtn').textContent = isSignUp ? 'Sign Up' : 'Sign In';
            document.getElementById('authSubtitle').textContent = isSignUp ? 'Create a new account' : 'Sign in to your account';
            document.getElementById('toggleText').textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
            document.getElementById('toggleLink').textContent = isSignUp ? 'Sign In' : 'Sign Up';
            hideError();
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg; el.style.display = 'block';
        }
        function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

        async function handleAuth() {
            hideError();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) return showError('Please fill in all fields.');

            const endpoint = isSignUp ? '/signup' : '/signin';
            try {
                const r = await fetch(API + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await r.json();
                if (!r.ok) return showError(data.message || 'Something went wrong.');

                if (isSignUp) {
                    showError(''); // clear
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('errorMsg').style.background = '#e3fcef';
                    document.getElementById('errorMsg').style.color = '#006644';
                    document.getElementById('errorMsg').textContent = 'Account created! Please sign in.';
                    toggleMode();
                } else {
                    localStorage.setItem('token', data.user.token);
                    localStorage.setItem('currentUser', JSON.stringify({ id: data.user.id, username: data.user.username }));
                    window.location.href = 'dashboard.html';
                }
            } catch (e) {
                showError('Cannot connect to server.');
            }
        }

        // Enter key support
        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });
    </script>
</body>
</html>
