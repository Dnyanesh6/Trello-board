<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trello Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0079bf; min-height: 100vh; }

        /* Auth */
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-box { background: #fff; padding: 32px; border-radius: 8px; width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .auth-box h2 { margin-bottom: 20px; color: #172b4d; text-align: center; }
        .auth-box input { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 2px solid #dfe1e6; border-radius: 4px; font-size: 14px; }
        .auth-box input:focus { border-color: #0079bf; outline: none; }
        .auth-box button { width: 100%; padding: 10px; background: #0079bf; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .auth-box button:hover { background: #026aa7; }
        .auth-box .toggle { text-align: center; margin-top: 14px; color: #5e6c84; font-size: 13px; }
        .auth-box .toggle a { color: #0079bf; cursor: pointer; text-decoration: underline; }

        /* App Layout */
        .app { display: none; flex-direction: column; min-height: 100vh; }
        .navbar { background: rgba(0,0,0,0.15); padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; }
        .navbar h1 { color: #fff; font-size: 20px; font-weight: 700; }
        .navbar .user-info { display: flex; align-items: center; gap: 12px; color: #fff; font-size: 14px; }
        .navbar button { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .navbar button:hover { background: rgba(255,255,255,0.3); }

        /* Sidebar + Content */
        .main { display: flex; flex: 1; }
        .sidebar { width: 260px; background: rgba(0,0,0,0.12); padding: 12px; overflow-y: auto; }
        .sidebar h3 { color: #fff; font-size: 14px; font-weight: 600; margin: 12px 0 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .sidebar .item { padding: 8px 10px; color: #fff; border-radius: 4px; cursor: pointer; font-size: 14px; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar .item:hover, .sidebar .item.active { background: rgba(255,255,255,0.2); }
        .sidebar .item .badge { background: rgba(255,255,255,0.3); padding: 1px 8px; border-radius: 10px; font-size: 11px; }

        .content { flex: 1; padding: 16px; overflow-x: auto; }

        /* Board View */
        .board-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .board-header h2 { color: #fff; font-size: 18px; font-weight: 700; }
        .columns { display: flex; gap: 12px; align-items: flex-start; min-height: 400px; }
        .column { background: #ebecf0; border-radius: 6px; width: 280px; min-width: 280px; padding: 8px; }
        .column-title { font-size: 14px; font-weight: 600; color: #172b4d; padding: 4px 8px 8px; }
        .card { background: #fff; border-radius: 4px; padding: 8px 10px; margin-bottom: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); cursor: pointer; font-size: 14px; color: #172b4d; }
        .card:hover { background: #f4f5f7; }
        .card .card-desc { font-size: 12px; color: #5e6c84; margin-top: 4px; }
        .card .card-actions { display: flex; gap: 6px; margin-top: 6px; }
        .card .card-actions button { font-size: 11px; padding: 2px 8px; border: none; border-radius: 3px; cursor: pointer; }
        .btn-advance { background: #0079bf; color: #fff; }
        .btn-advance:hover { background: #026aa7; }
        .btn-delete { background: #eb5a46; color: #fff; }
        .btn-delete:hover { background: #cf513d; }

        /* Forms */
        .inline-form { margin-top: 8px; }
        .inline-form input, .inline-form textarea { width: 100%; padding: 8px; border: 2px solid #0079bf; border-radius: 4px; font-size: 13px; margin-bottom: 6px; font-family: inherit; }
        .inline-form textarea { resize: vertical; min-height: 50px; }
        .inline-form button { padding: 6px 14px; background: #0079bf; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .add-btn { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.15); border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; width: 100%; text-align: left; margin-top: 4px; }
        .add-btn:hover { background: rgba(255,255,255,0.25); }
        .sidebar .add-btn { margin-top: 8px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 8px; padding: 24px; width: 420px; max-width: 90%; }
        .modal h3 { margin-bottom: 16px; color: #172b4d; }
        .modal input, .modal textarea { width: 100%; padding: 10px; border: 2px solid #dfe1e6; border-radius: 4px; font-size: 14px; margin-bottom: 10px; font-family: inherit; }
        .modal textarea { min-height: 80px; resize: vertical; }
        .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .modal button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .modal .btn-primary { background: #0079bf; color: #fff; }
        .modal .btn-cancel { background: #f4f5f7; color: #172b4d; }

        .empty-state { color: rgba(255,255,255,0.7); text-align: center; margin-top: 80px; font-size: 15px; }

        /* Members section */
        .members-list { margin-top: 8px; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 4px; color: #fff; font-size: 13px; }
        .member-item button { background: #eb5a46; color: #fff; border: none; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<!-- Auth Screen -->
<div class="auth-container" id="authScreen">
    <div class="auth-box">
        <h2 id="authTitle">Sign In</h2>
        <input type="text" id="authUsername" placeholder="Username">
        <input type="password" id="authPassword" placeholder="Password">
        <button id="authBtn" onclick="handleAuth()">Sign In</button>
        <div class="toggle">
            <span id="authToggleText">Don't have an account?</span>
            <a id="authToggleLink" onclick="toggleAuthMode()">Sign Up</a>
        </div>
    </div>
</div>

<!-- App -->
<div class="app" id="appScreen">
    <nav class="navbar">
        <h1>🗂 Trello Board</h1>
        <div class="user-info">
            <span id="usernameDisplay"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="main">
        <div class="sidebar">
            <h3>Organizations</h3>
            <div id="orgList"></div>
            <button class="add-btn" onclick="showModal('org')">+ Create Organization</button>

            <div id="boardSection" style="display:none;">
                <h3>Boards</h3>
                <div id="boardList"></div>
                <button class="add-btn" onclick="showModal('board')">+ Create Board</button>
            </div>

            <div id="memberSection" style="display:none;">
                <h3>Members</h3>
                <div id="memberList" class="members-list"></div>
                <button class="add-btn" onclick="showModal('member')">+ Add Member</button>
            </div>
        </div>
        <div class="content" id="content">
            <div class="empty-state">Select an organization and board to get started.</div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="hideModal(event)">
    <div class="modal" id="modal">
        <h3 id="modalTitle"></h3>
        <div id="modalBody"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="hideModal()">Cancel</button>
            <button class="btn-primary" id="modalSubmit">Create</button>
        </div>
    </div>
</div>

<script>
const API = ''; // e.g. 'http://localhost:3000' — leave empty if served from same origin

let token = localStorage.getItem('token') || '';
let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
let isSignUp = false;
let selectedOrg = null;
let selectedBoard = null;

// Init
if (token && currentUser) showApp();

function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (token) opts.headers['Authorization'] = 'Bearer ' + token;
    if (body) opts.body = JSON.stringify(body);
    return fetch(API + path, opts).then(r => r.json().then(d => ({ ok: r.ok, status: r.status, data: d })));
}

function toggleAuthMode() {
    isSignUp = !isSignUp;
    document.getElementById('authTitle').textContent = isSignUp ? 'Sign Up' : 'Sign In';
    document.getElementById('authBtn').textContent = isSignUp ? 'Sign Up' : 'Sign In';
    document.getElementById('authToggleText').textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
    document.getElementById('authToggleLink').textContent = isSignUp ? 'Sign In' : 'Sign Up';
}

async function handleAuth() {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value.trim();
    if (!username || !password) return alert('Please fill in all fields');

    const endpoint = isSignUp ? '/signup' : '/signin';
    const res = await api('POST', endpoint, { username, password });

    if (!res.ok) return alert(res.data.message || 'Error');

    if (isSignUp) {
        alert('Account created! Please sign in.');
        toggleAuthMode();
    } else {
        token = res.data.user.token;
        currentUser = { id: res.data.user.id, username: res.data.user.username };
        localStorage.setItem('token', token);
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        showApp();
    }
}

function showApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    document.getElementById('usernameDisplay').textContent = currentUser.username;
    loadOrgs();
}

function logout() {
    token = '';
    currentUser = null;
    selectedOrg = null;
    selectedBoard = null;
    localStorage.removeItem('token');
    localStorage.removeItem('currentUser');
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
}

// Organizations
async function loadOrgs() {
    const res = await api('GET', '/organizations');
    if (!res.ok) return;
    const list = document.getElementById('orgList');
    list.innerHTML = '';
    res.data.organizations.forEach(org => {
        const div = document.createElement('div');
        div.className = 'item' + (selectedOrg && selectedOrg.id === org.id ? ' active' : '');
        div.innerHTML = `<span>${org.name}</span><span class="badge">${org.members.length}m</span>`;
        div.onclick = () => selectOrg(org);
        list.appendChild(div);
    });
}

function selectOrg(org) {
    selectedOrg = org;
    selectedBoard = null;
    document.getElementById('boardSection').style.display = 'block';
    document.getElementById('memberSection').style.display = 'block';
    loadOrgs();
    loadBoards();
    loadMembers();
    document.getElementById('content').innerHTML = '<div class="empty-state">Select a board to view issues.</div>';
}

// Boards
async function loadBoards() {
    const res = await api('GET', '/boards', { orgId: selectedOrg.id });
    if (!res.ok) return;
    const list = document.getElementById('boardList');
    list.innerHTML = '';
    res.data.boards.forEach(board => {
        const div = document.createElement('div');
        div.className = 'item' + (selectedBoard && selectedBoard.id === board.id ? ' active' : '');
        div.textContent = board.name;
        div.onclick = () => selectBoard(board);
        list.appendChild(div);
    });
}

function selectBoard(board) {
    selectedBoard = board;
    loadBoards();
    loadIssues();
}

// Members
async function loadMembers() {
    const res = await api('GET', '/members', { orgId: selectedOrg.id });
    if (!res.ok) return;
    const list = document.getElementById('memberList');
    list.innerHTML = '';
    res.data.members.forEach(m => {
        const div = document.createElement('div');
        div.className = 'member-item';
        div.innerHTML = `<span>${m.username}</span><button onclick="removeMember('${m.username}')">Remove</button>`;
        list.appendChild(div);
    });
}

async function removeMember(username) {
    if (!confirm(`Remove ${username}?`)) return;
    await api('DELETE', '/delete-member', { username, orgId: selectedOrg.id });
    loadMembers();
}

// Issues
async function loadIssues() {
    const res = await api('GET', '/issues', { boardId: selectedBoard.id });
    if (!res.ok) return;

    const statuses = ['todo', 'doing', 'done'];
    const labels = { todo: '📋 To Do', doing: '🔨 In Progress', done: '✅ Done' };
    const grouped = { todo: [], doing: [], done: [] };
    res.data.issues.forEach(issue => {
        if (grouped[issue.status]) grouped[issue.status].push(issue);
    });

    let html = `<div class="board-header"><h2>${selectedBoard.name}</h2></div><div class="columns">`;
    statuses.forEach(status => {
        html += `<div class="column"><div class="column-title">${labels[status]} (${grouped[status].length})</div>`;
        grouped[status].forEach(issue => {
            const canAdvance = status !== 'done';
            html += `<div class="card">
                <strong>${issue.title}</strong>
                <div class="card-desc">${issue.description}</div>
                <div class="card-actions">
                    ${canAdvance ? `<button class="btn-advance" onclick="advanceIssue(${issue.id})">Advance →</button>` : ''}
                    <button class="btn-delete" onclick="deleteIssue(${issue.id})">Delete</button>
                </div>
            </div>`;
        });
        if (status === 'todo') {
            html += `<button class="add-btn" style="background:#0000001a;color:#172b4d;" onclick="showModal('issue')">+ Add Issue</button>`;
        }
        html += `</div>`;
    });
    html += `</div>`;
    document.getElementById('content').innerHTML = html;
}

async function advanceIssue(issueId) {
    await api('PUT', '/issues-update', { issueId });
    loadIssues();
}

async function deleteIssue(issueId) {
    if (!confirm('Delete this issue?')) return;
    await api('DELETE', '/issues', { issueId });
    loadIssues();
}

// Modal
function showModal(type) {
    const overlay = document.getElementById('modalOverlay');
    const title = document.getElementById('modalTitle');
    const body = document.getElementById('modalBody');
    const submit = document.getElementById('modalSubmit');

    if (type === 'org') {
        title.textContent = 'Create Organization';
        body.innerHTML = '<input id="m_orgName" placeholder="Organization Name"><textarea id="m_orgDesc" placeholder="Description"></textarea>';
        submit.onclick = async () => {
            const res = await api('POST', '/create-org', { orgName: document.getElementById('m_orgName').value, description: document.getElementById('m_orgDesc').value });
            if (!res.ok) return alert(res.data.message);
            hideModal(); loadOrgs();
        };
    } else if (type === 'board') {
        title.textContent = 'Create Board';
        body.innerHTML = '<input id="m_boardName" placeholder="Board Name">';
        submit.onclick = async () => {
            const res = await api('POST', '/boards', { boardName: document.getElementById('m_boardName').value, orgId: selectedOrg.id });
            if (!res.ok) return alert(res.data.message);
            hideModal(); loadBoards();
        };
    } else if (type === 'issue') {
        title.textContent = 'Create Issue';
        body.innerHTML = '<input id="m_issueTitle" placeholder="Issue Title"><textarea id="m_issueDesc" placeholder="Description"></textarea>';
        submit.onclick = async () => {
            const res = await api('POST', '/issues', { title: document.getElementById('m_issueTitle').value, description: document.getElementById('m_issueDesc').value, boardId: selectedBoard.id });
            if (!res.ok) return alert(res.data.message);
            hideModal(); loadIssues();
        };
    } else if (type === 'member') {
        title.textContent = 'Add Member';
        body.innerHTML = '<input id="m_memberName" placeholder="Username">';
        submit.onclick = async () => {
            const res = await api('POST', '/addUserToOrganization', { username: document.getElementById('m_memberName').value, orgId: selectedOrg.id });
            if (!res.ok) return alert(res.data.message);
            hideModal(); loadMembers();
        };
    }
    overlay.classList.add('show');
}

function hideModal(e) {
    if (e && e.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('show');
}
</script>
</body>
</html>
